## render.yaml — place in the repository root
##
## Render reads this file automatically when you connect the repo.
## Set the env vars marked `sync: false` manually in the Render dashboard
## (or via the Render CLI) — they contain secrets and must not be committed.
##
## Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: karfix
    env: python
    region: oregon           # change to your preferred region
    plan: starter            # or 'free' for testing
    branch: main

    buildCommand: pip install -r requirements.txt && chmod +x start.sh

    startCommand: bash start.sh

    healthCheckPath: /health

    envVars:
      - key: FLASK_ENV
        value: production

      - key: LOG_TO_STDOUT
        value: "true"

      - key: DB_SSLMODE
        value: require

      # Auto-generated by Render on first deploy
      - key: SECRET_KEY
        generateValue: true

      # ── Database ────────────────────────────────────────────────────────────
      # Paste your Supabase Session-pooler connection string here.
      # Format: postgresql://postgres.[ref]:[pw]@aws-0-[region].pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false

      # ── Supabase Auth ────────────────────────────────────────────────────────
      # SUPABASE_URL:        Project URL, e.g. https://xxxx.supabase.co
      # SUPABASE_ANON_KEY:   Public anon key (Dashboard → Settings → API)
      # SUPABASE_JWT_SECRET: JWT secret     (Dashboard → Settings → API → JWT Secret)
      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_ANON_KEY
        sync: false

      - key: SUPABASE_JWT_SECRET
        sync: false

      # ── Google OAuth (direct Flask integration) ──────────────────────────────
      # Authorised redirect URI to add in Google Cloud Console:
      #   https://<your-render-url>/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Stripe (if used) ─────────────────────────────────────────────────────
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
