{% extends "base/layout.html" %}

{% block title %}Profile - KarFix{% endblock %}

{% block content %}
<div class="container-xl py-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card">
        <div class="card-header"><h3 class="card-title mb-0">My profile</h3></div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('customer.profile') }}">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First name</label>
                <input type="text" name="first_name" class="form-control" value="{{ customer.first_name or '' }}">
              </div>
              <div class="col-md-6">
                <label class="form-label">Family name</label>
                <input type="text" name="family_name" class="form-control" value="{{ customer.family_name or '' }}" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="{{ customer.email }}" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ customer.phone or '' }}" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary">Save changes</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h3 class="card-title mb-0">Preferred workshop</h3>
          <a href="{{ url_for('customer.dashboard') }}" class="btn btn-sm btn-outline-primary">Back to dashboard</a>
        </div>
        <div class="card-body">
          <form method="POST" action="{{ url_for('customer.set_preferred_workshop') }}" class="row g-3 align-items-end">
            <div class="col-md-8">
              <label class="form-label">Workshop</label>
              <select name="tenant_id" class="form-select">
                {% for option in workshop_options %}
                  <option value="{{ option.tenant_id }}" {% if option.is_current %}selected{% endif %}>{{ option.tenant_name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <button type="submit" class="btn btn-primary w-100">Set preferred workshop</button>
            </div>
          </form>
          <div class="text-secondary mt-3">This choice determines which workshop opens when you log in.</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
